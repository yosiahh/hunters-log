<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grand Line Log Pose</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --gold: #FFD700;
            --marine-blue: #003366;
            --crimson: #990000;
            --parchment: #f4e4bc;
            --bg-dark: #0a0a0e;
        }

        body {
            margin: 0; background: var(--bg-dark); color: white;
            font-family: 'Georgia', serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- INTRO --- */
        #intro-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #1a1a2e, #000); z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s; text-align: center;
        }

        /* --- TABS --- */
        .tab-content { display: none; flex-grow: 1; overflow-y: auto; padding-bottom: 90px; }
        .tab-content.active { display: flex; flex-direction: column; }

        #map { flex-grow: 1; width: 100%; border-bottom: 2px solid var(--gold); }

        /* --- UI ELEMENTS --- */
        .log-card {
            background: rgba(244, 228, 188, 0.1); margin: 10px 15px; padding: 15px;
            border: 1px solid var(--gold); border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .delete-btn { color: var(--crimson); border: none; background: none; font-size: 1.5rem; cursor: pointer; }

        .items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .item-slot { 
            background: #1a1a1a; border: 1px solid #333; padding: 15px; 
            border-radius: 10px; text-align: center; transition: 0.3s;
        }
        .item-slot.unlocked { border-color: var(--gold); background: rgba(255, 215, 0, 0.1); }

        /* --- NAV --- */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: #111; border-top: 2px solid var(--gold);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { color: #666; font-size: 0.7rem; text-align: center; font-weight: bold; }
        .nav-item.active { color: var(--gold); }

        .btn-voyage {
            background: linear-gradient(135deg, var(--gold), #b8860b); color: black; border: none;
            padding: 15px 45px; border-radius: 5px; font-weight: bold; margin: 20px; align-self: center;
        }
    </style>
</head>
<body>

    <div id="intro-screen" onclick="startVoyage()">
        <div style="font-size: 5rem;">🧭</div>
        <h1 style="color: var(--gold);">LOG POSE SET</h1>
        <p style="color: #aaa; font-style: italic;">Tap to begin Voyage</p>
    </div>

    <div id="tab-voyage" class="tab-content active">
        <div id="map"></div>
        <button id="action-btn" class="btn-voyage">SET SAIL</button>
    </div>

    <div id="tab-records" class="tab-content">
        <header style="text-align: center; padding: 15px; color: var(--gold);">PIRATE RECORDS</header>
        <div id="logs-container"></div>
    </div>

    <div id="tab-vault" class="tab-content">
        <header style="text-align: center; padding: 15px; color: var(--gold);">TREASURE VAULT</header>
        <div id="items-grid" class="items-grid"></div>
    </div>

    <div id="tab-status" class="tab-content">
        <div style="text-align: center; margin-top: 40px;">
            <div style="border: 10px solid var(--parchment); background: var(--parchment); color: #332; padding: 20px; width: 180px; margin: 0 auto;">
                <p style="font-weight: bold; margin: 0;">WANTED</p>
                <div style="height: 120px; background: #bbb; margin: 10px 0;"></div>
                <h2 id="total-beli-display" style="margin: 0;">฿0</h2>
            </div>
            <h3 id="rank-display" style="color: var(--gold); margin-top: 20px;">ROOKIE</h3>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchTab('voyage', this)">VOYAGE</div>
        <div class="nav-item" onclick="switchTab('records', this)">RECORDS</div>
        <div class="nav-item" onclick="switchTab('vault', this)">VAULT</div>
        <div class="nav-item" onclick="switchTab('status', this)">STATUS</div>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, userMarker, pathLine, watchId, isTracking = false, currentPath = [], huntDist = 0;

        const REWARDS = [
            { id: 'igris', name: "Igris's Cape", dist: 5000, icon: "🧤", desc: "5km Milestone" },
            { id: 'nami', name: "Nami's Log Pose", dist: 11000, icon: "🧭", desc: "BGC to MOA" },
            { id: 'hat', name: "Straw Hat", dist: 40000, icon: "👒", desc: "Pirate King Dist." }
        ];

        function startVoyage() {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('intro-screen').style.display = 'none'; initMap(); }, 800);
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([14.5486, 121.0478], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);
            userMarker = L.circleMarker([14.5486, 121.0478], { color: '#990000', radius: 7 }).addTo(map);
            pathLine = L.polyline([], { color: '#b8860b', weight: 4, dashArray: '10, 10' }).addTo(map);
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            el.classList.add('active');
            if(tabId === 'records') renderLogs();
            if(tabId === 'vault') renderVault();
            if(tabId === 'status') updateStatus();
        }

        document.getElementById('action-btn').onclick = function() {
            if(!isTracking) {
                isTracking = true; this.innerText = "ANCHOR SHIP"; this.style.background = "var(--crimson)";
                huntDist = 0; currentPath = [];
                watchId = navigator.geolocation.watchPosition(p => {
                    const pos = [p.coords.latitude, p.coords.longitude];
                    if(currentPath.length > 0) huntDist += map.distance(currentPath[currentPath.length-1], pos);
                    currentPath.push(pos); userMarker.setLatLng(pos); pathLine.setLatLngs(currentPath); map.panTo(pos);
                }, null, {enableHighAccuracy:true});
            } else {
                stopHunt();
            }
        };

        function stopHunt() {
            isTracking = false; navigator.geolocation.clearWatch(watchId);
            const btn = document.getElementById('action-btn');
            btn.innerText = "SET SAIL"; btn.style.background = "linear-gradient(135deg, var(--gold), #b8860b)";
            
            if(huntDist > 5) {
                const log = { id: Date.now(), date: new Date().toLocaleDateString(), dist: Math.round(huntDist) };
                let logs = JSON.parse(localStorage.getItem('op_logs_v3') || "[]");
                logs.unshift(log); localStorage.setItem('op_logs_v3', JSON.stringify(logs));
                checkUnlocks(logs.reduce((s, l) => s + l.dist, 0));
                alert(`Island Found! +฿${log.dist}`);
            }
        }

        function checkUnlocks(total) {
            let unlocked = JSON.parse(localStorage.getItem('unlocked_items') || "[]");
            REWARDS.forEach(r => { if(total >= r.dist && !unlocked.includes(r.id)) unlocked.push(r.id); });
            localStorage.setItem('unlocked_items', JSON.stringify(unlocked));
        }

        function renderLogs() {
            const logs = JSON.parse(localStorage.getItem('op_logs_v3') || "[]");
            document.getElementById('logs-container').innerHTML = logs.map(l => `
                <div class="log-card">
                    <div><div style="font-size:0.7rem; color:var(--gold);">${l.date}</div><b>฿${l.dist.toLocaleString()}</b></div>
                    <button class="delete-btn" onclick="deleteLog(${l.id})">×</button>
                </div>
            `).join('') || '<p style="text-align:center;">No Voyages.</p>';
        }

        window.deleteLog = function(id) {
            let logs = JSON.parse(localStorage.getItem('op_logs_v3') || "[]");
            localStorage.setItem('op_logs_v3', JSON.stringify(logs.filter(l => l.id !== id)));
            renderLogs();
        }

        function renderVault() {
            const unlocked = JSON.parse(localStorage.getItem('unlocked_items') || "[]");
            document.getElementById('items-grid').innerHTML = REWARDS.map(r => {
                const isU = unlocked.includes(r.id);
                return `<div class="item-slot ${isU ? 'unlocked' : ''}">
                    <div style="font-size:2rem;">${isU ? r.icon : '❓'}</div>
                    <div style="font-size:0.7rem; font-weight:bold;">${isU ? r.name : 'LOCKED'}</div>
                </div>`;
            }).join('');
        }

        function updateStatus() {
            const logs = JSON.parse(localStorage.getItem('op_logs_v3') || "[]");
            const total = logs.reduce((s, l) => s + l.dist, 0);
            document.getElementById('total-beli-display').innerText = "฿" + total.toLocaleString();
            document.getElementById('rank-display').innerText = total > 50000 ? "WARLORD" : total > 10000 ? "SUPERNOVA" : "ROOKIE";
        }
    </script>
</body>
</html>
