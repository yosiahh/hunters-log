<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System: Grand Line Log Pose</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --neon-blue: #00E5FF;
            --neon-purple: #9D50BB;
            --gold: #FFD700;
            --crimson: #ff4b2b;
            --bg-black: #050505;
            --panel-bg: rgba(20, 20, 25, 0.95);
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-black); color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- SYSTEM INTRO --- */
        #intro-screen {
            position: fixed; inset: 0; background: black; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s;
        }
        .pulse { animation: pulse-anim 2s infinite; color: var(--neon-blue); letter-spacing: 4px; font-weight: bold; }
        @keyframes pulse-anim { 0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--neon-blue); } 50% { opacity: 0.3; } }

        /* --- TABS --- */
        .tab-content { display: none; flex-grow: 1; overflow-y: auto; padding-bottom: 90px; }
        .tab-content.active { display: flex; flex-direction: column; }

        #map { flex-grow: 1; width: 100%; border-bottom: 1px solid var(--neon-purple); }

        /* --- UI CARDS --- */
        .card {
            background: var(--panel-bg); margin: 10px 15px; padding: 15px;
            border: 1px solid #333; border-left: 4px solid var(--gold); border-radius: 4px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .delete-btn { color: var(--crimson); background: none; border: none; font-size: 1.5rem; padding: 0 10px; }

        /* --- VAULT GRID --- */
        .items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .item-slot { 
            background: #111; border: 1px solid #222; padding: 15px; border-radius: 8px; 
            text-align: center; opacity: 0.3; grayscale: 1; transition: 0.5s;
        }
        .item-slot.unlocked { opacity: 1; grayscale: 0; border-color: var(--gold); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }

        /* --- NAV BAR --- */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: rgba(5, 5, 5, 0.98); border-top: 1px solid var(--neon-purple);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-item { color: #555; font-size: 0.7rem; text-align: center; text-transform: uppercase; font-weight: bold; }
        .nav-item.active { color: var(--neon-blue); text-shadow: 0 0 8px var(--neon-blue); }

        .btn-action {
            width: 80%; padding: 15px; border: none; border-radius: 5px; margin: 15px auto;
            font-weight: bold; font-size: 1rem; letter-spacing: 2px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            box-shadow: 0 0 15px var(--neon-blue); color: black;
        }
    </style>
</head>
<body>

    <div id="intro-screen" onclick="awakenSystem()">
        <div class="pulse">INITIALIZING LOG POSE...</div>
        <p style="font-size: 0.8rem; color: #555; margin-top: 10px;">[ TAP TO AWAKEN ]</p>
    </div>

    <div id="tab-quest" class="tab-content active">
        <div id="map"></div>
        <button id="action-btn" class="btn-action">SET SAIL</button>
    </div>

    <div id="tab-records" class="tab-content">
        <header style="padding: 20px; color: var(--neon-purple); font-weight: bold;">[ SYSTEM LOGS ]</header>
        <div id="logs-container"></div>
    </div>

    <div id="tab-vault" class="tab-content">
        <header style="padding: 20px; color: var(--gold); font-weight: bold;">[ TREASURE VAULT ]</header>
        <div id="items-grid" class="items-grid"></div>
    </div>

    <div id="tab-status" class="tab-content">
        <div style="text-align: center; margin-top: 40px;">
            <div style="border: 4px solid var(--gold); display: inline-block; padding: 20px; background: #111;">
                <p style="color: var(--gold); margin: 0; font-weight: bold; letter-spacing: 3px;">WANTED</p>
                <div style="width: 150px; height: 150px; background: #222; margin: 15px auto; border: 1px solid #444; display: flex; align-items: center; justify-content: center; color: #444;">NO PHOTO</div>
                <h2 id="status-beli" style="margin: 0; color: white;">฿0</h2>
                <p style="font-size: 0.7rem; color: #888; margin-top: 5px;">CURRENT BOUNTY</p>
            </div>
            <h1 id="status-rank" style="margin-top: 25px; color: var(--neon-purple); text-shadow: 0 0 10px var(--neon-purple);">E-RANK</h1>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchTab('quest', this)">QUEST</div>
        <div class="nav-item" onclick="switchTab('records', this)">LOGS</div>
        <div class="nav-item" onclick="switchTab('vault', this)">VAULT</div>
        <div class="nav-item" onclick="switchTab('status', this)">PLAYER</div>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, userMarker, pathLine, watchId, isTracking = false, currentPath = [], huntDist = 0;

        const TREASURES = [
            { id: 'igris', name: "Igris's Cape", dist: 5000, icon: "🧤", desc: "S-Rank Shadow Gear" },
            { id: 'nami', name: "Nami's Log Pose", dist: 11000, icon: "🧭", desc: "BGC to MOA Nav" },
            { id: 'hat', name: "Straw Hat", dist: 50000, icon: "👒", desc: "Pirate King's Will" }
        ];

        function awakenSystem() {
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('intro-screen').style.display = 'none'; initMap(); }, 1000);
        }

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([14.5486, 121.0478], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            userMarker = L.circleMarker([14.5486, 121.0478], { color: '#00E5FF', radius: 6, fillOpacity: 1 }).addTo(map);
            pathLine = L.polyline([], { color: '#9D50BB', weight: 3 }).addTo(map);
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            el.classList.add('active');
            if(tabId === 'records') renderLogs();
            if(tabId === 'vault') renderVault();
            if(tabId === 'status') updateStatus();
        }

        document.getElementById('action-btn').onclick = function() {
            if(!isTracking) {
                isTracking = true; this.innerText = "END QUEST"; this.style.background = "var(--crimson)";
                this.style.boxShadow = "0 0 15px var(--crimson)";
                huntDist = 0; currentPath = [];
                watchId = navigator.geolocation.watchPosition(p => {
                    const pos = [p.coords.latitude, p.coords.longitude];
                    if(currentPath.length > 0) huntDist += map.distance(currentPath[currentPath.length-1], pos);
                    currentPath.push(pos); userMarker.setLatLng(pos); pathLine.setLatLngs(currentPath); map.panTo(pos);
                }, null, {enableHighAccuracy:true});
            } else {
                stopQuest();
            }
        };

        function stopQuest() {
            isTracking = false; navigator.geolocation.clearWatch(watchId);
            const btn = document.getElementById('action-btn');
            btn.innerText = "SET SAIL"; btn.style.background = "linear-gradient(90deg, var(--neon-blue), var(--neon-purple))";
            btn.style.boxShadow = "0 0 15px var(--neon-blue)";
            
            if(huntDist > 5) {
                if (window.navigator.vibrate) window.navigator.vibrate(200); // iPhone haptic
                const log = { id: Date.now(), date: new Date().toLocaleDateString(), dist: Math.round(huntDist) };
                let logs = JSON.parse(localStorage.getItem('system_logs_v4') || "[]");
                logs.unshift(log); localStorage.setItem('system_logs_v4', JSON.stringify(logs));
                checkUnlocks(logs.reduce((s, l) => s + l.dist, 0));
                alert(`[QUEST CLEARED] Reward: ฿${log.dist}`);
            }
        }

        function checkUnlocks(total) {
            let unlocked = JSON.parse(localStorage.getItem('system_vault') || "[]");
            TREASURES.forEach(t => { if(total >= t.dist && !unlocked.includes(t.id)) unlocked.push(t.id); });
            localStorage.setItem('system_vault', JSON.stringify(unlocked));
        }

        function renderLogs() {
            const logs = JSON.parse(localStorage.getItem('system_logs_v4') || "[]");
            document.getElementById('logs-container').innerHTML = logs.map(l => `
                <div class="card">
                    <div><div style="font-size:0.7rem; color:#666;">${l.date}</div><b style="color:var(--neon-blue)">฿${l.dist.toLocaleString()}</b></div>
                    <button class="delete-btn" onclick="deleteLog(${l.id})">×</button>
                </div>
            `).join('') || '<p style="text-align:center; color:#333;">NO DATA FOUND</p>';
        }

        window.deleteLog = function(id) {
            if(confirm("[SYSTEM] Delete this record forever?")) {
                let logs = JSON.parse(localStorage.getItem('system_logs_v4') || "[]");
                localStorage.setItem('system_logs_v4', JSON.stringify(logs.filter(l => l.id !== id)));
                renderLogs();
            }
        }

        function renderVault() {
            const unlocked = JSON.parse(localStorage.getItem('system_vault') || "[]");
            document.getElementById('items-grid').innerHTML = TREASURES.map(t => {
                const isU = unlocked.includes(t.id);
                return `<div class="item-slot ${isU ? 'unlocked' : ''}">
                    <div style="font-size:2rem;">${isU ? t.icon : '❓'}</div>
                    <div style="font-size:0.7rem; font-weight:bold; margin-top:5px;">${isU ? t.name : 'LOCKED'}</div>
                </div>`;
            }).join('');
        }

        function updateStatus() {
            const logs = JSON.parse(localStorage.getItem('system_logs_v4') || "[]");
            const total = logs.reduce((s, l) => s + l.dist, 0);
            document.getElementById('status-beli').innerText = "฿" + total.toLocaleString();
            let rank = "E-RANK";
            if(total > 50000) rank = "S-RANK / EMPEROR";
            else if(total > 25000) rank = "A-RANK / WARLORD";
            else if(total > 11000) rank = "B-RANK / SUPERNOVA";
            document.getElementById('status-rank').innerText = rank;
        }
    </script>
</body>
</html>
